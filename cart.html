<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Košík — Panfex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo"><a href="index.html"><h1>PANFEX</h1></a></div>
                <div style="margin-left:auto;display:flex;align-items:center;gap:1rem">
                    <a href="index.html" class="btn btn-outline">Zpět</a>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding-top:120px; padding-bottom:4rem;">
        <div class="container">
            <h2 class="section-title">Váš košík</h2>
            <div id="cart-page" style="max-width:900px;margin:0 auto;background:#fff;padding:1rem;border-radius:10px;box-shadow:var(--box-shadow);">
                <div id="cart-page-items">
                    <!-- items rendered by script -->
                </div>
                <div id="cart-page-summary" style="margin-top:1rem;display:flex;justify-content:space-between;align-items:center;">
                    <div id="cart-page-total" style="font-weight:700;font-size:1.1rem">Celkem: 0 Kč</div>
                    <a id="cart-page-checkout" class="btn btn-primary" href="#">Přejít k objednávce</a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Render cart page using shared cart functions
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadCart === 'function' && typeof updateCartUI === 'function') {
                loadCart();
                updateCartUI();
            }
        });
    </script>
</body>
</html>
