<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Moje objednávky — Panfex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .wrap { padding-top:120px; padding-bottom:4rem; }
        .card { background:#fff; border-radius:10px; box-shadow:var(--box-shadow); padding:1rem; max-width:1000px; margin:0 auto 1rem; }
        .muted { color:var(--gray-dark); }
        .row { display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
        .badge { display:inline-flex; align-items:center; gap:0.4rem; padding:0.25rem 0.55rem; border-radius:999px; font-weight:800; font-size:0.85rem; }
        .wait { background: rgba(255,193,7,0.15); color:#a46a00; }
        .sent { background: rgba(46,125,50,0.12); color:#2e7d32; }
        .btn-link { background:none; border:none; padding:0; color:var(--secondary-color); font-weight:700; cursor:pointer; }
        .items { margin-top:0.75rem; border-top:1px solid var(--gray-medium); padding-top:0.75rem; }
        .line { display:flex; justify-content:space-between; gap:1rem; margin:0.25rem 0; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo"><a href="index.html"><h1>PANFEX</h1></a></div>
                <div style="margin-left:auto;display:flex;align-items:center;gap:1rem">
                    <a href="index.html#produkty" class="btn btn-outline">Produkty</a>
                    <a href="cart.html" class="btn btn-outline">Košík</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="wrap">
        <div class="container">
            <h2 class="section-title">Moje objednávky</h2>
            <div id="orders"></div>
            <div class="card muted">
                Poznámka: bez napojení na banku nelze automaticky ověřit platbu — je to simulace. Pokud chceš, doplním i „admin“ stránku pro ruční potvrzení přijetí platby.
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function badge(status) {
            if (status === 'payment_sent') return '<span class=\"badge sent\"><i class=\"fas fa-check\"></i> Platba odeslána</span>';
            if (status === 'paid_confirmed') return '<span class=\"badge sent\"><i class=\"fas fa-check-circle\"></i> Zaplaceno</span>';
            return '<span class=\"badge wait\"><i class=\"fas fa-hourglass-half\"></i> Čeká na platbu</span>';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('orders');
            const orders = (typeof loadOrders === 'function') ? loadOrders() : [];

            if (!orders.length) {
                list.innerHTML = '<div class=\"card\"><h3>Zatím žádné objednávky</h3><p class=\"muted\">Vytvoř objednávku v košíku.</p><a class=\"btn btn-primary\" href=\"index.html#produkty\">Vybrat produkty</a></div>';
                return;
            }

            list.innerHTML = orders.map(o => `
                <div class=\"card\">
                    <div class=\"row\">
                        <div>
                            <div style=\"font-weight:900\">${o.id}</div>
                            <div class=\"muted\" style=\"font-size:0.9rem\">${new Date(o.createdAt).toLocaleString('cs-CZ')}</div>
                        </div>
                        <div style=\"text-align:right\">
                            ${badge(o.status)}<div style=\"height:0.35rem\"></div>
                            <div style=\"font-weight:900\">${o.total} Kč</div>
                        </div>
                    </div>
                    <div class=\"items\">
                        ${o.items.map(it => `<div class=\"line\"><span>${it.name} × ${it.qty}</span><span>${it.price * it.qty} Kč</span></div>`).join('')}
                        <div class=\"line\" style=\"margin-top:0.5rem\"><span class=\"muted\">Doprava</span><span>${o.shippingPrice} Kč</span></div>
                    </div>
                    <div style=\"margin-top:0.75rem;display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;\">
                        <a class=\"btn btn-outline\" href=\"payment.html?order=${encodeURIComponent(o.id)}\">Zobrazit platbu</a>
                        <a class=\"btn btn-outline\" href=\"order-confirmation.html?order=${encodeURIComponent(o.id)}\">Detail</a>
                        <button class=\"btn-link\" data-confirm-paid=\"${o.id}\">Simulace: potvrdit přijetí platby</button>
                    </div>
                </div>
            `).join('');

            list.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-confirm-paid]');
                if (!btn) return;
                const id = btn.getAttribute('data-confirm-paid');
                if (typeof updateOrderStatus === 'function') updateOrderStatus(id, 'paid_confirmed');
                window.location.reload();
            });
        });
    </script>
</body>
</html>
